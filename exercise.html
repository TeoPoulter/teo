<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Timer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #05070c;
      --card-bg: rgba(8, 12, 20, 0.72);
      --card-border: rgba(255, 255, 255, 0.12);
      --text-main: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.72);
      --green: #4ade80;
      --green-strong: #22c55e;
      --cyan: #38bdf8;
      --yellow: #fde68a;
      --red: #ef4444;
      --red-dark: #991b1b;
      --shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
    }

    body {
      font-family: 'Roboto', sans-serif;
      color: var(--text-main);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 90px 20px 70px;
    }

    /* Infinite Background Gradient Animation */
    .infinite-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.25), transparent 30%),
        radial-gradient(circle at 80% 10%, rgba(56, 189, 248, 0.22), transparent 32%),
        radial-gradient(circle at 50% 90%, rgba(168, 85, 247, 0.18), transparent 35%),
        linear-gradient(135deg, #020617, #07111f, #050816, #0a0f1f);
      background-size: 180% 180%;
      animation: gradientAnimation 18s ease infinite;
      z-index: -4;
    }

    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Background Particle Animation */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -3;
    }

    .background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 58px 58px;
      opacity: 0.55;
      animation: moveParticles 22s linear infinite;
    }

    @keyframes moveParticles {
      from {
        transform: translate(0, 0);
      }
      to {
        transform: translate(-58px, -58px);
      }
    }

    .background::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image:
        radial-gradient(circle, rgba(74, 222, 128, 0.16), transparent 14%),
        radial-gradient(circle, rgba(56, 189, 248, 0.12), transparent 18%);
      background-position: 20% 30%, 70% 65%;
      animation: rotate 30s linear infinite;
      filter: blur(18px);
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Time Buttons for Start and End Time */
    .time-button {
      position: fixed;
      background: rgba(8, 12, 20, 0.68);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 0.95em;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
      z-index: 2;
    }

    .time-button:hover {
      transform: translateY(-2px);
      border-color: rgba(74, 222, 128, 0.4);
      background: rgba(8, 12, 20, 0.82);
    }

    .time-start {
      top: 20px;
      left: 20px;
    }

    .time-end {
      top: 20px;
      right: 20px;
    }

    /* Notification Styles */
    .notification {
      position: fixed;
      right: 20px;
      min-width: 145px;
      background: rgba(8, 12, 20, 0.74);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: var(--green);
      padding: 13px 18px;
      border-radius: 16px;
      border: 1px solid rgba(74, 222, 128, 0.2);
      font-size: 1.15em;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
      z-index: 2;
    }

    /* Swap positions: "[y] done" on top, "[number] left" below */
    #completedNotification {
      top: 82px;
    }

    #notification {
      top: 142px;
    }

    /* Lifetime Reps Counter */
    .lifetime-presses {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(8, 12, 20, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 0.95em;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.86);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
      z-index: 2;
    }

    #pressesCount {
      color: var(--green);
      font-weight: 700;
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.035)),
        var(--card-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--card-border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 38px;
      width: 92%;
      max-width: 620px;
      text-align: center;
      margin: 0 auto;
      animation: fadeIn 0.9s ease forwards;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(74, 222, 128, 0.18), transparent 36%),
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
      pointer-events: none;
    }

    .container > * {
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      margin-bottom: 22px;
      font-size: clamp(2.1em, 6vw, 3.1em);
      font-weight: 700;
      letter-spacing: -0.055em;
      line-height: 1;
      text-shadow: 0 10px 35px rgba(0, 0, 0, 0.35);
    }

    /* Button Container */
    .button-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 22px 0 28px;
    }

    .alarm-button {
      background: url('/teo/i.png') no-repeat center;
      background-size: contain;
      width: 190px;
      height: 190px;
      border: none;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.25s ease, filter 0.25s ease;
      border-radius: 50%;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 22px 60px rgba(0, 0, 0, 0.45),
        0 0 70px rgba(74, 222, 128, 0.14);
      filter: drop-shadow(0 20px 28px rgba(0, 0, 0, 0.35));
    }

    .alarm-button:active {
      transform: scale(0.95);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 10px 30px rgba(0, 0, 0, 0.45),
        0 0 50px rgba(74, 222, 128, 0.18);
    }

    .alarm-button:hover {
      outline: none;
      transform: translateY(-3px) scale(1.025);
      filter: drop-shadow(0 24px 34px rgba(0, 0, 0, 0.42)) brightness(1.08);
    }

    /* Input Containers */
    .input-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 15px 0;
    }

    label {
      flex: 1;
      margin-right: 4px;
      text-align: right;
      font-size: 1.05em;
      font-weight: 500;
      color: var(--text-muted);
    }

    input {
      flex: 2;
      min-width: 0;
      padding: 13px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 1em;
      font-weight: 500;
      background-color: rgba(255, 255, 255, 0.065);
      color: #fff;
      text-align: center;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus {
      outline: none;
      background-color: rgba(255, 255, 255, 0.1);
      border-color: rgba(74, 222, 128, 0.75);
      box-shadow:
        0 0 0 4px rgba(74, 222, 128, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.58);
      opacity: 1;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin: 24px 0 18px;
    }

    button {
      padding: 13px 26px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.055));
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 14px;
      cursor: pointer;
      font-size: 1.05em;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 14px 35px rgba(0, 0, 0, 0.28);
      transition: background-color 0.3s, transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    }

    button:hover {
      background:
        linear-gradient(180deg, rgba(74, 222, 128, 0.25), rgba(34, 197, 94, 0.13));
      border-color: rgba(74, 222, 128, 0.35);
      transform: translateY(-2px);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
    }

    .pause-button {
      background:
        linear-gradient(180deg, rgba(239, 68, 68, 0.32), rgba(153, 27, 27, 0.42));
      border-color: rgba(248, 113, 113, 0.26);
    }

    .pause-button:hover {
      background:
        linear-gradient(180deg, rgba(239, 68, 68, 0.48), rgba(153, 27, 27, 0.56));
      border-color: rgba(248, 113, 113, 0.42);
    }

    /* Estimated Time & Countdown Timer */
    .estimated-time {
      font-size: 1.05em;
      font-weight: 500;
      color: var(--yellow);
      margin-top: 14px;
      transition: color 0.3s ease;
    }

    .countdown-timer {
      font-size: 1.3em;
      font-weight: 700;
      margin-top: 18px;
      color: var(--cyan);
      transition: color 0.3s ease;
      text-shadow: 0 0 26px rgba(56, 189, 248, 0.25);
    }

    /* Full-Screen Notification */
    .full-screen-notification {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 40%, rgba(74, 222, 128, 0.16), transparent 35%),
        rgba(2, 6, 23, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeInFullScreen 0.5s ease;
      padding: 20px;
    }

    @keyframes fadeInFullScreen {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .notification-content {
      text-align: center;
      padding: 34px 38px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.09), rgba(255, 255, 255, 0.04)),
        rgba(8, 12, 20, 0.86);
      border: 1px solid rgba(255, 255, 255, 0.13);
      color: var(--green);
      transform: scale(1);
      transition: transform 0.3s ease;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55);
      max-width: 520px;
      width: 100%;
    }

    .notification-content h1 {
      font-size: clamp(2em, 7vw, 3em);
      margin-bottom: 20px;
      color: #fff;
    }

    .notification-content p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 1.05em;
      margin: 8px 0;
    }

    .time-taken {
      font-size: 1.35em !important;
      color: var(--yellow) !important;
      margin-top: 16px !important;
      font-weight: 700;
    }

    @media (max-width: 680px) {
      body {
        align-items: flex-start;
        padding: 118px 14px 90px;
      }

      .container {
        padding: 28px 20px;
        border-radius: 24px;
      }

      .time-button {
        font-size: 0.82em;
        padding: 9px 12px;
      }

      .time-start {
        top: 14px;
        left: 14px;
      }

      .time-end {
        top: 14px;
        right: 14px;
      }

      .notification {
        right: 14px;
        min-width: 122px;
        font-size: 0.98em;
        padding: 10px 13px;
      }

      #completedNotification {
        top: 62px;
      }

      #notification {
        top: 112px;
      }

      .lifetime-presses {
        left: 14px;
        bottom: 14px;
        font-size: 0.88em;
      }

      .alarm-button {
        width: 165px;
        height: 165px;
      }

      .input-container {
        align-items: stretch;
      }

      label {
        font-size: 0.95em;
      }

      input {
        padding: 12px 10px;
      }

      .controls {
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 13px 16px;
        font-size: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="infinite-bg"></div>
  <div class="background"></div>

  <!-- Display of Start and End Time -->
  <div class="time-button time-start">Start Time: <span id="startTime"></span></div>
  <div class="time-button time-end">End Time: <span id="endTime"></span></div>

  <!-- Notifications on the right side -->
  <div class="notification" id="completedNotification"></div>
  <div class="notification" id="notification"></div>

  <!-- Lifetime Presses Counter -->
  <div class="lifetime-presses">Lifetime Reps: <span id="pressesCount">0</span></div>

  <!-- Main Container -->
  <div class="container">
    <h1>Workout Timer</h1>

    <!-- Play sound button -->
    <div class="button-container">
      <button class="alarm-button" onclick="playSound()" onmouseover="hoverEffect()"></button>
    </div>

    <!-- Reps Input -->
    <div class="input-container">
      <label for="times">Reps:</label>
      <input type="number" id="times" min="1" value="1" oninput="saveSettings()" />
    </div>

    <!-- Rest Time Input -->
    <div class="input-container">
      <label for="minutes">Rest Time:</label>
      <input type="number" id="minutes" min="0" value="0" placeholder="Minutes" oninput="saveSettings()" />
      <input type="number" id="seconds" min="0" max="59" value="0" placeholder="Seconds" oninput="saveSettings()" />
    </div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="togglePause()" id="pauseButton" class="pause-button">Pause</button>
      <button onclick="startAlarm()">Start</button>
    </div>

    <!-- Estimated Time & Countdown Display -->
    <div class="estimated-time" id="estimatedTime"></div>
    <div class="countdown-timer" id="countdownTimer"></div>

    <!-- Full-Screen Notification (hidden by default) -->
    <div class="full-screen-notification" id="fullScreenNotification" style="display: none;">
      <div class="notification-content" id="fullScreenContent"></div>
    </div>
  </div>

  <!-- Audio File Reference (replace 'beep.mp3' with your path if needed) -->
  <audio id="alarmSound" src="beep.mp3"></audio>

  <script>
    let countdownInterval;
    let remainingTime = 0;
    let isPaused = false;
    let nextDingTime = 0;
    let startTime = 0;
    let totalTime = 0; // Total workout time in milliseconds
    let restInterval = 0; // Rest interval time in milliseconds

    document.addEventListener('DOMContentLoaded', () => {
      try {
        const pressesCountElement = document.getElementById('pressesCount');
        const storedPresses = parseInt(localStorage.getItem('pressesCount')) || 0;
        pressesCountElement.textContent = storedPresses;

        // Restore settings from localStorage
        const times = localStorage.getItem('times');
        const minutes = localStorage.getItem('minutes');
        const seconds = localStorage.getItem('seconds');

        if (times) document.getElementById('times').value = times;
        if (minutes) document.getElementById('minutes').value = minutes;
        if (seconds) document.getElementById('seconds').value = seconds;

        // Update the estimated time on load
        updateEstimatedTime(times, minutes, seconds);
      } catch (error) {
        console.error('Error on DOMContentLoaded:', error);
      }
    });

    function playSound() {
      const audio = document.getElementById('alarmSound');
      audio.play();
      incrementPressesCount();
    }

    function incrementPressesCount() {
      const pressesCountElement = document.getElementById('pressesCount');
      let pressesCount = parseInt(pressesCountElement.textContent);
      pressesCount++;
      pressesCountElement.textContent = pressesCount;
      localStorage.setItem('pressesCount', pressesCount);
    }

    function saveSettings() {
      const times = document.getElementById('times').value;
      const minutes = document.getElementById('minutes').value;
      const seconds = document.getElementById('seconds').value;

      localStorage.setItem('times', times);
      localStorage.setItem('minutes', minutes);
      localStorage.setItem('seconds', seconds);

      updateEstimatedTime(times, minutes, seconds);
    }

    function showNotification(message, completed) {
      const notificationElement = document.getElementById('notification');
      notificationElement.textContent = message;

      const completedNotificationElement = document.getElementById('completedNotification');
      completedNotificationElement.textContent = completed;
    }

    function updateEstimatedTime(times, minutes, seconds) {
      try {
        // Convert to integers
        const t = parseInt(times) || 0;
        const m = parseInt(minutes) || 0;
        const s = parseInt(seconds) || 0;

        // Basic validation
        if (t < 1 || (m === 0 && s === 0)) {
          document.getElementById('estimatedTime').textContent = 'Please enter valid values.';
          return;
        }

        const interval = m * 60000 + s * 1000;
        totalTime = interval * t;
        restInterval = interval;

        const totalMinutes = Math.floor(totalTime / 60000);
        const totalSeconds = Math.floor((totalTime % 60000) / 1000);

        document.getElementById('estimatedTime').textContent =
          `Estimated Time: ${totalMinutes} minutes ${totalSeconds} seconds`;
      } catch (error) {
        console.error('Error updating estimated time:', error);
      }
    }

    function startAlarm() {
      try {
        const times = parseInt(document.getElementById('times').value);
        const minutes = parseInt(document.getElementById('minutes').value);
        const seconds = parseInt(document.getElementById('seconds').value);
        const interval = minutes * 60000 + seconds * 1000;

        if (isNaN(times) || isNaN(minutes) || isNaN(seconds) || times <= 0 || interval <= 0) {
          alert('Please enter valid values for reps and rest time.');
          return;
        }

        let remainingDings = times;
        let completedDings = 0;
        let delay = 0;

        // Mark the start
        startTime = Date.now();

        // Show start time
        const startTimeElement = document.getElementById('startTime');
        startTimeElement.textContent = new Date(startTime).toLocaleTimeString();

        // Set the end time for display
        const endTimeVal = startTime + times * interval;
        document.getElementById('endTime').textContent = new Date(endTimeVal).toLocaleTimeString();

        // Update the UI
        updateEstimatedTime(times, minutes, seconds);
        document.getElementById('estimatedTime').style.display = 'block';

        // Set the overall countdown for next ding
        remainingTime = times * interval;
        startCountdown(interval);

        // Schedule each "ding"
        for (let i = 0; i < times; i++) {
          setTimeout(() => {
            playSound();
            completedDings++;
            remainingDings--;

            // Update notifications
            showNotification(`${remainingDings} left`, `${completedDings} done`);

            // If there are still dings left, start a sub-countdown
            if (remainingDings > 0) {
              nextDingTime = Date.now() + interval;
              startNextDingTimer(restInterval);
            } else {
              // Last rep done, show the full-screen notification
              showFullScreenNotification(times, minutes, seconds);
            }
          }, delay);

          delay += interval;
        }
      } catch (error) {
        console.error('Error starting alarm:', error);
      }
    }

    function startNextDingTimer(interval) {
      clearInterval(countdownInterval);

      let remainingInterval = interval;
      countdownInterval = setInterval(() => {
        if (!isPaused) {
          remainingInterval -= 1000;
          const rmMins = Math.floor(remainingInterval / 60000);
          const rmSecs = Math.floor((remainingInterval % 60000) / 1000);

          const countdownTimer = document.getElementById('countdownTimer');
          countdownTimer.textContent = `Next ding in: ${rmMins} minutes ${rmSecs} seconds`;

          if (remainingInterval <= 0) {
            clearInterval(countdownInterval);
            countdownTimer.textContent =
              `Next ding in: ${Math.floor(interval / 60000)} minutes 0 seconds`;
          }
        }
      }, 1000);
    }

    function startCountdown(interval) {
      clearInterval(countdownInterval);

      countdownInterval = setInterval(() => {
        if (!isPaused) {
          remainingTime -= 1000;
          updateCountdownTimer();
          if (remainingTime <= 0) {
            clearInterval(countdownInterval);
          }
        }
      }, 1000);
    }

    function updateCountdownTimer() {
      const countdownTimer = document.getElementById('countdownTimer');
      const seconds = Math.ceil(remainingTime / 1000);
      countdownTimer.textContent = `Next ding in: ${seconds} seconds`;
    }

    function togglePause() {
      isPaused = !isPaused;
      const pauseButton = document.getElementById('pauseButton');
      pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
    }

    function hoverEffect() {
      const soundButton = document.querySelector('.alarm-button');
      soundButton.style.backgroundImage =
        "url('/teo/i.png')";
    }

    function showFullScreenNotification(times, minutes, seconds) {
      const fullScreenNotification = document.getElementById('fullScreenNotification');
      const fullScreenContent = document.getElementById('fullScreenContent');

      const endTime = startTime + totalTime;
      const timeTaken = calculateTimeDifference(startTime, endTime);

      fullScreenContent.innerHTML = `
        <h1>Workout Complete</h1>
        <p>Start Time: ${new Date(startTime).toLocaleTimeString()}</p>
        <p>End Time: ${new Date(endTime).toLocaleTimeString()}</p>
        <p>Reps: ${times}</p>
        <p>Rest Time: ${minutes} minutes ${seconds} seconds</p>
        <p class="time-taken">Time Taken: ${timeTaken}</p>
      `;
      fullScreenNotification.style.display = 'flex';

      // Dismiss on click
      fullScreenNotification.addEventListener('click', () => {
        fullScreenNotification.style.display = 'none';
      });
    }

    function calculateTimeDifference(start, end) {
      const difference = end - start;
      const minutes = Math.floor(difference / 60000);
      const seconds = Math.floor((difference % 60000) / 1000);
      return `${minutes} minutes ${seconds} seconds`;
    }
  </script>
</body>
</html>
