<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workout Timer</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* Global Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-dark: #030712;
      --panel: rgba(8, 13, 24, 0.74);
      --panel-strong: rgba(10, 16, 30, 0.9);
      --border: rgba(255, 255, 255, 0.13);
      --border-soft: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.68);
      --green: #4ade80;
      --green-deep: #16a34a;
      --cyan: #38bdf8;
      --yellow: #fde68a;
      --red: #ef4444;
      --red-deep: #991b1b;
      --shadow-xl: 0 34px 110px rgba(0, 0, 0, 0.62);
      --shadow-md: 0 18px 48px rgba(0, 0, 0, 0.34);
    }

    body {
      font-family: 'Roboto', sans-serif;
      color: var(--text);
      position: relative;
      overflow-x: hidden;
      min-height: 100vh;
      background: var(--bg-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 20px 76px;
    }

    /* Infinite Background Gradient Animation */
    .infinite-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 18% 18%, rgba(74, 222, 128, 0.22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(56, 189, 248, 0.2), transparent 30%),
        radial-gradient(circle at 50% 96%, rgba(168, 85, 247, 0.16), transparent 36%),
        linear-gradient(135deg, #020617, #06111f 36%, #050816 68%, #020617);
      background-size: 190% 190%;
      animation: gradientAnimation 20s ease infinite;
      z-index: -4;
    }

    @keyframes gradientAnimation {
      0% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
      100% {
        background-position: 0% 50%;
      }
    }

    /* Background Particle Animation */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: -3;
    }

    .background::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 200%;
      height: 200%;
      background:
        linear-gradient(rgba(255, 255, 255, 0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.032) 1px, transparent 1px);
      background-size: 64px 64px;
      opacity: 0.52;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 78%);
      animation: moveParticles 24s linear infinite;
    }

    @keyframes moveParticles {
      from {
        transform: translate(0, 0);
      }
      to {
        transform: translate(-64px, -64px);
      }
    }

    .background::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background-image:
        radial-gradient(circle, rgba(74, 222, 128, 0.13), transparent 15%),
        radial-gradient(circle, rgba(56, 189, 248, 0.1), transparent 18%);
      background-position: 22% 30%, 72% 66%;
      animation: rotate 34s linear infinite;
      filter: blur(20px);
      opacity: 0.9;
    }

    @keyframes rotate {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Time Buttons for Start and End Time */
    .time-button {
      position: fixed;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.035)),
        rgba(8, 13, 24, 0.76);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--border);
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 0.95em;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow-md);
      transition: transform 0.28s ease, border-color 0.28s ease, background 0.28s ease;
      z-index: 2;
    }

    .time-button.is-empty {
      display: none;
    }

    .time-button:hover {
      transform: translateY(-2px);
      border-color: rgba(74, 222, 128, 0.42);
      background:
        linear-gradient(180deg, rgba(74, 222, 128, 0.12), rgba(255, 255, 255, 0.04)),
        rgba(8, 13, 24, 0.88);
    }

    .time-start {
      top: 20px;
      left: 20px;
    }

    .time-end {
      top: 20px;
      right: 20px;
    }

    /* Notification Styles */
    .notification {
      position: fixed;
      right: 20px;
      min-width: 148px;
      background:
        linear-gradient(180deg, rgba(74, 222, 128, 0.08), rgba(255, 255, 255, 0.035)),
        rgba(8, 13, 24, 0.78);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      color: var(--green);
      padding: 13px 18px;
      border-radius: 18px;
      border: 1px solid rgba(74, 222, 128, 0.22);
      font-size: 1.15em;
      font-weight: 700;
      text-align: center;
      box-shadow: var(--shadow-md);
      transition: opacity 0.3s ease-in-out, transform 0.3s ease;
      z-index: 2;
    }

    .notification:empty {
      display: none;
    }

    /* Swap positions: "[y] done" on top, "[number] left" below */
    #completedNotification {
      top: 82px;
    }

    #notification {
      top: 144px;
    }

    /* Lifetime Reps Counter */
    .lifetime-presses {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.035)),
        rgba(8, 13, 24, 0.76);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border: 1px solid var(--border);
      padding: 11px 16px;
      border-radius: 999px;
      font-size: 0.95em;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow-md);
      z-index: 2;
    }

    #pressesCount {
      color: var(--green);
      font-weight: 700;
    }

    /* Main Container */
    .container {
      position: relative;
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.035)),
        var(--panel);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid var(--border);
      border-radius: 32px;
      box-shadow: var(--shadow-xl);
      padding: 40px;
      width: 92%;
      max-width: 630px;
      text-align: center;
      margin: 0 auto;
      animation: fadeIn 0.9s ease forwards;
      overflow: hidden;
    }

    .container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 0%, rgba(74, 222, 128, 0.2), transparent 35%),
        radial-gradient(circle at 100% 20%, rgba(56, 189, 248, 0.12), transparent 32%),
        linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.075), transparent);
      pointer-events: none;
    }

    .container::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: 31px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      pointer-events: none;
    }

    .container > * {
      position: relative;
      z-index: 1;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    h1 {
      margin-bottom: 24px;
      font-size: clamp(2.15em, 6vw, 3.2em);
      font-weight: 700;
      letter-spacing: -0.06em;
      line-height: 0.95;
      text-shadow: 0 14px 38px rgba(0, 0, 0, 0.42);
    }

    /* Button Container */
    .button-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 24px 0 30px;
    }

    .alarm-button {
      background: url('/teo/i.png') no-repeat center;
      background-size: contain;
      width: 196px;
      height: 196px;
      border: none;
      cursor: pointer;
      transition: transform 0.14s ease, box-shadow 0.25s ease, filter 0.25s ease;
      border-radius: 50%;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 24px 65px rgba(0, 0, 0, 0.48),
        0 0 82px rgba(74, 222, 128, 0.16);
      filter: drop-shadow(0 20px 30px rgba(0, 0, 0, 0.38));
    }

    .alarm-button:active {
      transform: scale(0.95);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 12px 35px rgba(0, 0, 0, 0.48),
        0 0 58px rgba(74, 222, 128, 0.2);
    }

    .alarm-button:hover {
      outline: none;
      transform: translateY(-4px) scale(1.025);
      filter: drop-shadow(0 26px 36px rgba(0, 0, 0, 0.44)) brightness(1.08);
    }

    /* Input Containers */
    .input-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 15px 0;
    }

    label {
      flex: 1;
      margin-right: 4px;
      text-align: right;
      font-size: 1.05em;
      font-weight: 500;
      color: var(--muted);
    }

    input {
      flex: 2;
      min-width: 0;
      padding: 14px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 1em;
      font-weight: 500;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.075), rgba(255, 255, 255, 0.045)),
        rgba(255, 255, 255, 0.045);
      color: #fff;
      text-align: center;
      outline: none;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.07),
        0 10px 24px rgba(0, 0, 0, 0.18);
      transition: background-color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input:focus {
      outline: none;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.065)),
        rgba(255, 255, 255, 0.07);
      border-color: rgba(74, 222, 128, 0.76);
      box-shadow:
        0 0 0 4px rgba(74, 222, 128, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.09),
        0 12px 28px rgba(0, 0, 0, 0.22);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.56);
      opacity: 1;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin: 26px 0 18px;
    }

    button {
      padding: 14px 27px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.055));
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 16px;
      cursor: pointer;
      font-size: 1.05em;
      font-weight: 700;
      letter-spacing: -0.01em;
      box-shadow: 0 16px 38px rgba(0, 0, 0, 0.3);
      transition: background-color 0.3s, transform 0.2s, border-color 0.3s, box-shadow 0.3s;
    }

    button:hover {
      background:
        linear-gradient(180deg, rgba(74, 222, 128, 0.28), rgba(34, 197, 94, 0.14));
      border-color: rgba(74, 222, 128, 0.38);
      transform: translateY(-2px);
      box-shadow: 0 20px 48px rgba(0, 0, 0, 0.36);
    }

    .pause-button {
      background:
        linear-gradient(180deg, rgba(239, 68, 68, 0.34), rgba(153, 27, 27, 0.44));
      border-color: rgba(248, 113, 113, 0.28);
    }

    .pause-button:hover {
      background:
        linear-gradient(180deg, rgba(239, 68, 68, 0.5), rgba(153, 27, 27, 0.58));
      border-color: rgba(248, 113, 113, 0.44);
    }

    /* Estimated Time & Countdown Timer */
    .estimated-time {
      font-size: 1.05em;
      font-weight: 500;
      color: var(--yellow);
      margin-top: 14px;
      transition: color 0.3s ease;
    }

    .countdown-timer {
      font-size: 1.32em;
      font-weight: 700;
      margin-top: 18px;
      color: var(--cyan);
      transition: color 0.3s ease;
      text-shadow: 0 0 28px rgba(56, 189, 248, 0.28);
    }

    /* Full-Screen Notification */
    .full-screen-notification {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 50% 40%, rgba(74, 222, 128, 0.18), transparent 35%),
        rgba(2, 6, 23, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
      animation: fadeInFullScreen 0.5s ease;
      padding: 20px;
    }

    @keyframes fadeInFullScreen {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .notification-content {
      text-align: center;
      padding: 36px 40px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.04)),
        rgba(8, 13, 24, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--green);
      transform: scale(1);
      transition: transform 0.3s ease;
      box-shadow: var(--shadow-xl);
      max-width: 530px;
      width: 100%;
    }

    .notification-content h1 {
      font-size: clamp(2em, 7vw, 3em);
      margin-bottom: 20px;
      color: #fff;
    }

    .notification-content p {
      color: rgba(255, 255, 255, 0.82);
      font-size: 1.05em;
      margin: 8px 0;
    }

    .time-taken {
      font-size: 1.35em !important;
      color: var(--yellow) !important;
      margin-top: 16px !important;
      font-weight: 700;
    }

    @media (max-width: 680px) {
      body {
        align-items: flex-start;
        padding: 120px 14px 90px;
      }

      .container {
        padding: 30px 20px;
        border-radius: 26px;
      }

      .container::after {
        border-radius: 25px;
      }

      .time-button {
        font-size: 0.82em;
        padding: 9px 12px;
      }

      .time-start {
        top: 14px;
        left: 14px;
      }

      .time-end {
        top: 14px;
        right: 14px;
      }

      .notification {
        right: 14px;
        min-width: 122px;
        font-size: 0.98em;
        padding: 10px 13px;
        border-radius: 15px;
      }

      #completedNotification {
        top: 62px;
      }

      #notification {
        top: 113px;
      }

      .lifetime-presses {
        left: 14px;
        bottom: 14px;
        font-size: 0.88em;
        padding: 10px 13px;
      }

      .alarm-button {
        width: 168px;
        height: 168px;
      }

      .input-container {
        align-items: stretch;
      }

      label {
        font-size: 0.95em;
      }

      input {
        padding: 12px 10px;
      }

      .controls {
        gap: 10px;
      }

      button {
        flex: 1;
        padding: 13px 16px;
        font-size: 1em;
      }
    }
  </style>
</head>
<body>
  <div class="infinite-bg"></div>
  <div class="background"></div>

  <!-- Display of Start and End Time -->
  <div class="time-button time-start is-empty">Start Time: <span id="startTime"></span></div>
  <div class="time-button time-end is-empty">End Time: <span id="endTime"></span></div>

  <!-- Notifications on the right side -->
  <div class="notification" id="completedNotification"></div>
  <div class="notification" id="notification"></div>

  <!-- Lifetime Presses Counter -->
  <div class="lifetime-presses">Lifetime Reps: <span id="pressesCount">0</span></div>

  <!-- Main Container -->
  <div class="container">
    <h1>Workout Timer</h1>

    <!-- Play sound button -->
    <div class="button-container">
      <button class="alarm-button" onclick="playSound()" onmouseover="hoverEffect()"></button>
    </div>

    <!-- Reps Input -->
    <div class="input-container">
      <label for="times">Reps:</label>
      <input type="number" id="times" min="1" value="1" oninput="saveSettings()" />
    </div>

    <!-- Rest Time Input -->
    <div class="input-container">
      <label for="minutes">Rest Time:</label>
      <input type="number" id="minutes" min="0" value="5" placeholder="Minutes" oninput="saveSettings()" />
      <input type="number" id="seconds" min="0" max="59" value="0" placeholder="Seconds" oninput="saveSettings()" />
    </div>

    <!-- Controls -->
    <div class="controls">
      <button onclick="togglePause()" id="pauseButton" class="pause-button">Pause</button>
      <button onclick="startAlarm()">Start</button>
    </div>

    <!-- Estimated Time & Countdown Display -->
    <div class="estimated-time" id="estimatedTime"></div>
    <div class="countdown-timer" id="countdownTimer"></div>

    <!-- Full-Screen Notification (hidden by default) -->
    <div class="full-screen-notification" id="fullScreenNotification" style="display: none;">
      <div class="notification-content" id="fullScreenContent"></div>
    </div>
  </div>

  <!-- Audio File Reference (replace 'beep.mp3' with your path if needed) -->
  <audio id="alarmSound" src="beep.mp3"></audio>

  <script>
    let countdownInterval;
    let remainingTime = 0;
    let isPaused = false;
    let nextDingTime = 0;
    let startTime = 0;
    let totalTime = 0; // Total workout time in milliseconds
    let restInterval = 0; // Rest interval time in milliseconds

    document.addEventListener('DOMContentLoaded', () => {
      try {
        const pressesCountElement = document.getElementById('pressesCount');
        const storedPresses = parseInt(localStorage.getItem('pressesCount')) || 0;
        pressesCountElement.textContent = storedPresses;

        // Restore settings from localStorage
        const times = localStorage.getItem('times');
        const minutes = localStorage.getItem('minutes');
        const seconds = localStorage.getItem('seconds');

        if (times) document.getElementById('times').value = times;
        if (minutes) document.getElementById('minutes').value = minutes;
        if (seconds) document.getElementById('seconds').value = seconds;

        // Update the estimated time on load
        updateEstimatedTime(
          document.getElementById('times').value,
          document.getElementById('minutes').value,
          document.getElementById('seconds').value
        );
      } catch (error) {
        console.error('Error on DOMContentLoaded:', error);
      }
    });

    function playSound() {
      const audio = document.getElementById('alarmSound');
      audio.play();
      incrementPressesCount();
    }

    function incrementPressesCount() {
      const pressesCountElement = document.getElementById('pressesCount');
      let pressesCount = parseInt(pressesCountElement.textContent);
      pressesCount++;
      pressesCountElement.textContent = pressesCount;
      localStorage.setItem('pressesCount', pressesCount);
    }

    function saveSettings() {
      const times = document.getElementById('times').value;
      const minutes = document.getElementById('minutes').value;
      const seconds = document.getElementById('seconds').value;

      localStorage.setItem('times', times);
      localStorage.setItem('minutes', minutes);
      localStorage.setItem('seconds', seconds);

      updateEstimatedTime(times, minutes, seconds);
    }

    function showNotification(message, completed) {
      const notificationElement = document.getElementById('notification');
      notificationElement.textContent = message;

      const completedNotificationElement = document.getElementById('completedNotification');
      completedNotificationElement.textContent = completed;
    }

    function updateEstimatedTime(times, minutes, seconds) {
      try {
        // Convert to integers
        const t = parseInt(times) || 0;
        const m = parseInt(minutes) || 0;
        const s = parseInt(seconds) || 0;

        // Basic validation
        if (t < 1 || (m === 0 && s === 0)) {
          document.getElementById('estimatedTime').textContent = 'Please enter valid values.';
          return;
        }

        const interval = m * 60000 + s * 1000;
        totalTime = interval * t;
        restInterval = interval;

        const totalMinutes = Math.floor(totalTime / 60000);
        const totalSeconds = Math.floor((totalTime % 60000) / 1000);

        document.getElementById('estimatedTime').textContent =
          `Estimated Time: ${totalMinutes} minutes ${totalSeconds} seconds`;
      } catch (error) {
        console.error('Error updating estimated time:', error);
      }
    }

    function startAlarm() {
      try {
        const times = parseInt(document.getElementById('times').value);
        const minutes = parseInt(document.getElementById('minutes').value);
        const seconds = parseInt(document.getElementById('seconds').value);
        const interval = minutes * 60000 + seconds * 1000;

        if (isNaN(times) || isNaN(minutes) || isNaN(seconds) || times <= 0 || interval <= 0) {
          alert('Please enter valid values for reps and rest time.');
          return;
        }

        let remainingDings = times;
        let completedDings = 0;
        let delay = 0;

        // Mark the start
        startTime = Date.now();

        // Show start time
        const startTimeElement = document.getElementById('startTime');
        startTimeElement.textContent = new Date(startTime).toLocaleTimeString();
        document.querySelector('.time-start').classList.remove('is-empty');

        // Set the end time for display
        const endTimeVal = startTime + times * interval;
        document.getElementById('endTime').textContent = new Date(endTimeVal).toLocaleTimeString();
        document.querySelector('.time-end').classList.remove('is-empty');

        // Update the UI
        updateEstimatedTime(times, minutes, seconds);
        document.getElementById('estimatedTime').style.display = 'block';

        // Set the overall countdown for next ding
        remainingTime = times * interval;
        startCountdown(interval);

        // Schedule each "ding"
        for (let i = 0; i < times; i++) {
          setTimeout(() => {
            playSound();
            completedDings++;
            remainingDings--;

            // Update notifications
            showNotification(`${remainingDings} left`, `${completedDings} done`);

            // If there are still dings left, start a sub-countdown
            if (remainingDings > 0) {
              nextDingTime = Date.now() + interval;
              startNextDingTimer(restInterval);
            } else {
              // Last rep done, show the full-screen notification
              showFullScreenNotification(times, minutes, seconds);
            }
          }, delay);

          delay += interval;
        }
      } catch (error) {
        console.error('Error starting alarm:', error);
      }
    }

    function startNextDingTimer(interval) {
      clearInterval(countdownInterval);

      let remainingInterval = interval;
      countdownInterval = setInterval(() => {
        if (!isPaused) {
          remainingInterval -= 1000;
          const rmMins = Math.floor(remainingInterval / 60000);
          const rmSecs = Math.floor((remainingInterval % 60000) / 1000);

          const countdownTimer = document.getElementById('countdownTimer');
          countdownTimer.textContent = `Next ding in: ${rmMins} minutes ${rmSecs} seconds`;

          if (remainingInterval <= 0) {
            clearInterval(countdownInterval);
            countdownTimer.textContent =
              `Next ding in: ${Math.floor(interval / 60000)} minutes 0 seconds`;
          }
        }
      }, 1000);
    }

    function startCountdown(interval) {
      clearInterval(countdownInterval);

      countdownInterval = setInterval(() => {
        if (!isPaused) {
          remainingTime -= 1000;
          updateCountdownTimer();
          if (remainingTime <= 0) {
            clearInterval(countdownInterval);
          }
        }
      }, 1000);
    }

    function updateCountdownTimer() {
      const countdownTimer = document.getElementById('countdownTimer');
      const seconds = Math.ceil(remainingTime / 1000);
      countdownTimer.textContent = `Next ding in: ${seconds} seconds`;
    }

    function togglePause() {
      isPaused = !isPaused;
      const pauseButton = document.getElementById('pauseButton');
      pauseButton.textContent = isPaused ? 'Resume' : 'Pause';
    }

    function hoverEffect() {
      const soundButton = document.querySelector('.alarm-button');
      soundButton.style.backgroundImage =
        "url('/teo/i.png')";
    }

    function showFullScreenNotification(times, minutes, seconds) {
      const fullScreenNotification = document.getElementById('fullScreenNotification');
      const fullScreenContent = document.getElementById('fullScreenContent');

      const endTime = startTime + totalTime;
      const timeTaken = calculateTimeDifference(startTime, endTime);

      fullScreenContent.innerHTML = `
        <h1>Workout Complete</h1>
        <p>Start Time: ${new Date(startTime).toLocaleTimeString()}</p>
        <p>End Time: ${new Date(endTime).toLocaleTimeString()}</p>
        <p>Reps: ${times}</p>
        <p>Rest Time: ${minutes} minutes ${seconds} seconds</p>
        <p class="time-taken">Time Taken: ${timeTaken}</p>
      `;
      fullScreenNotification.style.display = 'flex';

      // Dismiss on click
      fullScreenNotification.addEventListener('click', () => {
        fullScreenNotification.style.display = 'none';
      });
    }

    function calculateTimeDifference(start, end) {
      const difference = end - start;
      const minutes = Math.floor(difference / 60000);
      const seconds = Math.floor((difference % 60000) / 1000);
      return `${minutes} minutes ${seconds} seconds`;
    }
  </script>
</body>
</html>
